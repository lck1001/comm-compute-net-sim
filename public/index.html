<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>通信算力网络仿真环境</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="brand-block">
          <h1>通信算力网络仿真</h1>
          <p id="clock">等待数据</p>
        </section>

        <section class="panel controls-panel sim-config-panel">
          <div class="panel-title">仿真设置</div>
          <div class="form-row inline-fields">
            <span class="compact"><label for="nodeCountInput">节点</label><input id="nodeCountInput" type="number" min="3" max="2000" step="10" value="200"></span>
            <span class="compact"><label for="edgeCountInput">边缘</label><input id="edgeCountInput" type="number" min="3" max="66" step="1" value="66"></span>
          </div>
          <div class="form-row compact">
            <label for="linkRadiusInput">半径</label>
            <input id="linkRadiusInput" type="range" min="0.1" max="1.5" step="0.05" value="0.55" />
          </div>
          <div class="setting-row">
            <button id="resetSim" class="primary-button" style="background:#70a7ff">重置</button>
            <button id="togglePause" class="primary-button" style="background:#f6c453;color:#06100e">暂停</button>
          </div>
        </section>

        <section class="panel controls-panel data-ingest-panel">
          <div class="panel-title">数据接入</div>
          <div class="import-row">
            <label for="remoteImageInput">遥感图</label>
            <input id="remoteImageInput" type="file" accept="image/*" />
          </div>
          <div class="situation-source-row">
            <label for="situationSourceSelect">拍摄终端</label>
            <select id="situationSourceSelect"></select>
          </div>
          <div class="situation-description-row">
            <label for="situationDescriptionInput">态势描述</label>
            <textarea id="situationDescriptionInput" rows="3" placeholder="描述图上可见目标、位置、航迹或异常态势"></textarea>
          </div>
          <button id="triggerTsScan" class="primary-button ts-button">上传态势描述</button>
          <div id="situationStatus" class="inject-status hidden"></div>
          <div class="export-grid">
            <button type="button" data-export="nodes">导出节点</button>
            <button type="button" data-export="links">导出链路</button>
            <button type="button" data-export="tasks">导出任务</button>
            <button type="button" data-export="telemetry">导出采集</button>
          </div>
        </section>

        <section class="panel controls-panel task-panel-fill task-inject-panel">
          <div class="panel-title">任务注入</div>
          <div class="form-row">
            <label class="sr-only" for="originSelect">发起节点</label>
            <select id="originSelect"></select>
          </div>
          <div class="form-row">
            <label for="computeInput">算力需求</label>
            <input id="computeInput" type="number" min="100" max="3000" step="50" value="960" />
          </div>
          <div class="form-row compact">
            <label for="storageInput">存储</label>
            <input id="storageInput" type="number" min="50" max="1800" step="25" value="420" />
          </div>
          <div class="form-row compact">
            <label for="dataInput">数据量</label>
            <input id="dataInput" type="number" min="20" max="1800" step="20" value="520" />
          </div>
          <div class="form-row">
            <label for="splitStrategy">拆分策略</label>
            <select id="splitStrategy">
              <option value="equal">默认均分</option>
              <option value="resourceWeighted">资源权重</option>
            </select>
          </div>
          <div class="priority-row">
            <label>优先级</label>
            <div class="segmented" role="group" aria-label="priority">
              <button class="active" data-priority="中">中</button>
              <button data-priority="高">高</button>
              <button data-priority="紧急">紧急</button>
            </div>
          </div>
          <div class="demand-preview" aria-label="任务需求概览">
            <div class="demand-preview-head">
              <span>需求概览</span>
              <b id="previewPriority">中优先级</b>
            </div>
            <div class="demand-preview-grid">
              <span><b id="previewCompute">960</b><em>算力</em></span>
              <span><b id="previewStorage">420</b><em>存储</em></span>
              <span><b id="previewData">520</b><em>数据</em></span>
            </div>
            <div class="demand-load"><i id="previewLoad"></i></div>
            <div class="demand-preview-foot">
              <span>综合负载</span>
              <b id="previewLoadText">--</b>
            </div>
          </div>
          <div class="task-spacer"></div>
          <button id="injectTask" class="primary-button">注入任务</button>
          <div id="injectStatus" class="inject-status hidden"></div>
        </section>
      </aside>

      <section class="stage">
        <header class="topbar">
          <div class="tabs" role="tablist">
            <button class="active" data-view="topology">动态拓扑</button>
            <button data-view="links">链路详情</button>
            <button data-view="trace">任务追踪</button>
            <button data-view="data">数据采集</button>
            <button data-view="sensing">态势感知</button>
          </div>
          <div class="topbar-legend">
            <span class="legend-dot" style="background:#f6c453"></span>云
            <span class="legend-dot" style="background:#41d6a6"></span>边
            <span class="legend-dot" style="background:#70a7ff"></span>端
          </div>
          <div class="topbar-stats">
            <span id="onlineNodes">-- 在线</span>
            <span id="completeTasks">-- 完成</span>
            <span id="rejectedTasks">-- 拒绝</span>
          </div>
        </header>

        <section id="topologyView" class="view active">
          <canvas id="networkCanvas" aria-label="network topology"></canvas>
          <div id="hoverTip" class="hover-tip hidden"></div>
          <div id="nodePopup" class="node-popup hidden"></div>
        </section>

        <section id="linksView" class="view table-view">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>链路</th>
                  <th>端点</th>
                  <th>角色</th>
                  <th>带宽 Mbps</th>
                  <th>时延 ms</th>
                  <th>丢包 %</th>
                  <th>负载</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="linkRows"></tbody>
            </table>
          </div>
        </section>

        <section id="traceView" class="view trace-view">
          <div class="trace-board">
            <div class="trace-header">
              <div>
                <span class="eyebrow">当前信息</span>
                <h2 id="traceTitle">暂无任务</h2>
              </div>
              <div id="traceStatus" class="trace-status">等待调度</div>
            </div>
            <canvas id="traceCanvas" aria-label="packet trace"></canvas>
            <div id="fragmentList" class="fragment-list"></div>
          </div>
        </section>

        <section id="dataView" class="view data-view">
          <div class="data-board">
            <div id="dataStats" class="data-stats"></div>
            <section class="collector-map">
              <div class="collector-title">
                <div>
                  <span class="eyebrow">端-边-云数据汇聚</span>
                  <h2>终端采集数据上行回传态势</h2>
                </div>
                <span class="collector-badge">实时采集</span>
              </div>
              <canvas id="dataCanvas" aria-label="data collection flow"></canvas>
            </section>
            <section class="data-bottom">
              <article class="data-table-panel">
                <header><b>采集数据记录</b><span>按最新采样排序</span></header>
                <div id="dataRows" class="data-records"></div>
              </article>
              <article class="data-log-panel">
                <header><b>逐跳回传日志</b><span>边缘中转与云端入库</span></header>
                <div id="dataLog" class="hop-log"></div>
              </article>
            </section>
          </div>
        </section>

        <section id="sensingView" class="view sensing-view">
          <div class="sensing-board">
            <section class="sensing-map">
              <div class="sensing-title">
                <div>
                  <span class="eyebrow">遥感图协同态势感知</span>
                  <h2 id="sensingTitle">等待遥感图或仿真感知帧</h2>
                </div>
                <span id="sensingBadge" class="collector-badge">融合态势</span>
              </div>
              <canvas id="sensingCanvas" aria-label="remote sensing target sensing"></canvas>
            </section>
            <aside class="sensing-side">
              <div id="tsStats" class="ts-stats"></div>
              <div id="tsDetectionList" class="ts-detection-list"></div>
            </aside>
          </div>
        </section>
      </section>

      <aside class="inspector">
        <section class="panel summary-panel">
          <div class="panel-title">全网状态</div>
          <div class="metric-grid">
            <div><span id="nodeCount">--</span><label>节点</label></div>
            <div><span id="activeLinks">--</span><label>链路</label></div>
            <div><span id="avgUtil">--</span><label>平均负载</label></div>
            <div><span id="runningTasks">--</span><label>运行任务</label></div>
          </div>
          <div id="nodeTypeBreakdown" class="type-breakdown">云 -- · 边 -- · 端 --</div>
        </section>

        <section class="panel task-panel task-panel-fill">
          <div class="panel-title">调度队列</div>
          <div id="taskList" class="task-list"></div>
        </section>
      </aside>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
